##############################################################################
# Nginx config for YuktiCode — reverse-proxies API & WS; serves SPA for all
# other requests.
#
# Request routing:
#   /api/*      → upstream FastAPI (strips /api prefix)
#   /ws/*       → upstream FastAPI WebSocket (upgraded)
#   everything  → index.html  (React SPA client-side routing)
##############################################################################

upstream backend {
    server backend:9000;
    keepalive 32;
}

server {
    listen       80;
    server_name  _;

    # ─── Gzip compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;

    root  /usr/share/nginx/html;
    index index.html;

    # ─── Static assets with long cache ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ─── Backend REST API  (/api/* → FastAPI, prefix stripped) ─────────────
    location /api/ {
        proxy_pass         http://backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── WebSocket endpoint (/ws/* → FastAPI, prefix preserved) ────────────
    location /ws/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;   # keep open while waiting for verdict
        proxy_send_timeout  3600s;
    }

    # ─── SPA fallback — all other paths serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection      "1; mode=block" always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    }

    # ─── Health check ───────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
